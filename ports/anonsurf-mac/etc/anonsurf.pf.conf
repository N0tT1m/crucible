# anonsurf-mac packet filter rules.
#
# Loaded into the "anonsurf" anchor. Loaded by `enable.sh`, removed by
# `disable.sh`. NB: the placeholders {IFACE} and {USER} are substituted at
# install time; the runtime file lives at /usr/local/etc/anonsurf-mac.pf.conf.

# 1. Allow Tor itself out (so the daemon can reach the network)
pass out quick proto tcp from any to any port 9001 user {USER}
pass out quick proto tcp from any to any port 9030 user {USER}
pass out quick proto tcp from any to any port 9050 user {USER}

# 2. Redirect every other outbound TCP into Tor's TransPort
rdr pass on lo0 inet proto tcp from any to any -> 127.0.0.1 port 9040
rdr pass on {IFACE} inet proto tcp from any to !127.0.0.1 -> 127.0.0.1 port 9040

# 3. Redirect DNS into Tor's DNSPort
rdr pass on lo0 inet proto udp from any to any port 53 -> 127.0.0.1 port 5353
rdr pass on {IFACE} inet proto udp from any to any port 53 -> 127.0.0.1 port 5353

# 4. Drop everything else outbound (no UDP leaks, no QUIC, no raw)
block drop out quick proto udp from any to any port != 5353
block drop out quick proto icmp
