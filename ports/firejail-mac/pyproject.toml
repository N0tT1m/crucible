[project]
name = "firejail-mac"
version = "0.1.0"
description = "Firejail-style sandboxing on macOS via sandbox-exec / Seatbelt."
requires-python = ">=3.11"

[project.scripts]
firejail-mac = "firejail_mac.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["firejail_mac"]
