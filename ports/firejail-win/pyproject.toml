[project]
name = "firejail-win"
version = "0.1.0"
description = "Firejail-style sandboxing on Windows via AppContainer / Job Objects / Windows Sandbox."
requires-python = ">=3.11"
dependencies = ["pywin32>=306; sys_platform == 'win32'"]

[project.scripts]
firejail-win = "firejail_win.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["firejail_win"]
