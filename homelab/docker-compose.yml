# Redlab — full stack.
#
# Default profile (no flags):  ollama + litellm + agent
# `--profile heavy`:            adds vllm (Qwen3-32B FP8) — needs the 5090
# `--profile data`:             adds postgres + qdrant
# `--profile obs`:              adds langfuse for trace inspection
#
# Examples:
#   docker compose up -d                                # light targets only
#   docker compose --profile heavy up -d                # + vLLM
#   docker compose --profile heavy --profile obs up -d  # full setup

services:
  # ---------- ollama: easy small/medium model swaps ----------
  ollama:
    image: ollama/ollama:latest
    container_name: redlab-ollama
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=4

  # ---------- vllm: heavy hitter (Qwen3-32B FP8) ----------
  vllm:
    image: vllm/vllm-openai:latest
    container_name: redlab-vllm
    profiles: [heavy]
    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    ports:
      - "8001:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_USE_V1=1
    command: >
      --model Qwen/Qwen3-32B
      --served-model-name qwen3-32b
      --quantization fp8
      --kv-cache-dtype fp8
      --max-model-len 32768
      --max-num-seqs 32
      --gpu-memory-utilization 0.92
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --trust-remote-code
      --host 0.0.0.0
      --port 8000

  # ---------- litellm: one OpenAI-compatible endpoint for all targets ----------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: redlab-litellm
    restart: unless-stopped
    depends_on: [ollama]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-redlab-dev}

  # ---------- agent: attackable target (built from ./agent) ----------
  agent:
    build: ./agent
    container_name: redlab-agent
    restart: unless-stopped
    depends_on: [ollama]
    ports:
      - "8000:8000"
    volumes:
      - ./agent/sandbox:/app/sandbox
      - ./agent/outbox:/app/outbox
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL=${AGENT_MODEL:-qwen2.5:14b}
      - MAX_TOOL_ITERATIONS=8
    mem_limit: 2g
    cpus: 2.0

  # ---------- optional data layer ----------
  postgres:
    image: postgres:16-alpine
    container_name: redlab-postgres
    profiles: [data, obs]
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-please}
      - POSTGRES_DB=redlab
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: redlab-qdrant
    profiles: [data, rag]
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  # ---------- optional observability ----------
  langfuse:
    image: langfuse/langfuse:2
    container_name: redlab-langfuse
    profiles: [obs]
    restart: unless-stopped
    depends_on: [postgres]
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-redlab}@postgres:5432/redlab
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET:-change-me-please}
      - SALT=${LANGFUSE_SALT:-change-me-please}
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    ports:
      - "3000:3000"

volumes:
  ollama-data:
  hf-cache:
  pg-data:
  qdrant-data:
