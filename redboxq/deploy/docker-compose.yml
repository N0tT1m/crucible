# redboxq stack. Run from redboxq/ — `docker compose -f deploy/docker-compose.yml up -d`.
#
# Host ports are offset from the empire defaults so redboxq can run
# alongside mommy-smoothies-morning-milking (ClickHouse :8123/:9000) and
# lupes-anal-ytics (OTel collector :4317/:4318) without collision.
#
#   redboxq dashboard      127.0.0.1:7000
#   redboxq ClickHouse     127.0.0.1:8124 (HTTP)  /  127.0.0.1:9001 (native)
#   redboxq OTel gRPC      127.0.0.1:4327
#   redboxq OTel HTTP      127.0.0.1:4328
#
# Inside the docker network the containers still talk on the default
# ports (clickhouse:9000, otel-collector:4317), so the redboxq service's
# REDBOXQ_CH_ADDR / REDBOXQ_OTLP_ENDPOINT do not change.

services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: redboxq-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8124:8123"   # HTTP
      - "127.0.0.1:9001:9000"   # native
    volumes:
      - ch-data:/var/lib/clickhouse
      - ../migrations:/docker-entrypoint-initdb.d:ro
    environment:
      - CLICKHOUSE_DB=mart
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Idempotent migration runner. POSTs every /migrations/*.sql to ClickHouse
  # over HTTP so we get readable error messages. Every migration uses
  # IF NOT EXISTS, so re-running on every `docker compose up` is safe.
  #
  # The script lives in a real file (not inline YAML) because YAML literal
  # blocks preserve CRLF when committed from a Windows host, and `sh -c`
  # chokes on \r at EOL. The script also strips \r from the migration
  # files before POSTing so SQL parsers don't see "\rCREATE\r".
  ch-migrate:
    # Use the clickhouse-server image so we get clickhouse-client in PATH.
    # `clickhouse-client --multiquery` natively supports multi-statement
    # files; the HTTP `multistatements` URL param doesn't exist on 24.3.
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: redboxq-ch-migrate
    depends_on: [clickhouse]
    restart: "no"
    volumes:
      - ../migrations:/migrations:ro
      - ./migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: redboxq-otel
    restart: unless-stopped
    depends_on: [clickhouse]
    ports:
      - "127.0.0.1:4327:4317"   # OTLP gRPC
      - "127.0.0.1:4328:4318"   # OTLP HTTP
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]

  redboxq:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: redboxq
    restart: unless-stopped
    depends_on:
      ch-migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    ports:
      - "127.0.0.1:7000:7000"
    environment:
      - REDBOXQ_LISTEN_ADDR=:7000
      - REDBOXQ_CH_ADDR=clickhouse:9000
      - REDBOXQ_CH_DATABASE=mart
      - REDBOXQ_CH_USERNAME=default
      - REDBOXQ_CH_PASSWORD=
      - REDBOXQ_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=redboxq
      - REDBOXQ_DISCORD_WEBHOOK_URL=${REDBOXQ_DISCORD_WEBHOOK_URL:-}
      - REDBOXQ_TELEGRAM_BOT_TOKEN=${REDBOXQ_TELEGRAM_BOT_TOKEN:-}
      - REDBOXQ_TELEGRAM_CHAT_ID=${REDBOXQ_TELEGRAM_CHAT_ID:-}

  # one-shot dbt runner. invoke via:
  #   docker compose -f deploy/docker-compose.yml --profile dbt run --rm dbt build
  dbt:
    image: ghcr.io/dbt-labs/dbt-clickhouse:1.8.latest
    container_name: redboxq-dbt
    profiles: [dbt]
    depends_on:
      ch-migrate:
        condition: service_completed_successfully
    working_dir: /usr/app/dbt
    volumes:
      - ../dbt:/usr/app/dbt
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt
      - CH_HOST=clickhouse
      - CH_PORT=9000
      - CH_USER=default
      - CH_PASSWORD=
      - CH_DATABASE=mart

  # Continuous mart refresher — keeps mart_* in sync with raw.attacks
  # so the dashboard auto-updates without a manual `dbt run` after every
  # bench. Default tick is 30s; tune via REFRESH_INTERVAL.
  #
  # Uses python:3.11-slim + pip install on first boot so we don't depend
  # on a third-party dbt image that might be private / rate-limited.
  # First boot takes ~30-60s for the pip install; subsequent restarts
  # reuse the persisted dbt-venv volume.
  dbt-refresh:
    image: python:3.11-slim
    container_name: redboxq-dbt-refresh
    restart: unless-stopped
    depends_on:
      ch-migrate:
        condition: service_completed_successfully
    working_dir: /usr/app/dbt
    volumes:
      - ../dbt:/usr/app/dbt
      - ./dbt-refresh.sh:/usr/local/bin/dbt-refresh.sh:ro
      - dbt-venv:/opt/venv
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt
      - CH_HOST=clickhouse
      - CH_PORT=9000
      - CH_USER=default
      - CH_PASSWORD=
      - CH_DATABASE=mart
      - REFRESH_INTERVAL=30
      - PIP_DISABLE_PIP_VERSION_CHECK=1
      # DBT_RUN_FLAGS=--threads 1   # uncomment if you hit dbt-clickhouse races
    entrypoint: ["/bin/sh", "/usr/local/bin/dbt-refresh.sh"]

volumes:
  ch-data:
  dbt-venv:
